<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>采购工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="workspace-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">PO</div>
          <div>
            <p class="eyebrow">Procurement Command Center</p>
            <h1>采购工作台</h1>
          </div>
        </div>

        <div class="topbar-meta" aria-label="采购组织信息">
          <div class="meta-chip">
            <span>采购组织</span>
            <strong>华东集采中心</strong>
          </div>
          <div class="meta-chip">
            <span>业务日期</span>
            <strong>2026.04.07</strong>
          </div>
          <div class="meta-chip meta-chip-highlight">
            <span>今日状态</span>
            <strong>12 项待处理</strong>
          </div>
          <div class="avatar" aria-hidden="true">采</div>
        </div>
      </header>

      <nav class="main-nav" aria-label="一级导航">
        <button class="main-nav-item active" data-menu="home">工作台</button>
        <button class="main-nav-item" data-menu="sourcing">寻源定价</button>
        <button class="main-nav-item" data-menu="supplier">供应商协同</button>
        <button class="main-nav-item" data-menu="execution">采购执行</button>
        <button class="main-nav-item" data-menu="inbound">到货质检</button>
        <button class="main-nav-item" data-menu="settlement">对账结算</button>
        <button class="main-nav-item" data-menu="analysis">经营分析</button>
      </nav>

      <section id="subnav-shell" class="subnav-shell" aria-label="二级导航">
        <div class="subnav-head">
          <p class="eyebrow">Daily Workflow</p>
          <h2 id="subnav-title">工作台</h2>
        </div>
        <div id="subnav" class="subnav"></div>
      </section>

      <main class="content-shell">
        <div class="content-topbar">
          <div id="breadcrumb" class="breadcrumb">工作台</div>
          <div class="status-line">ERP 工作台 · PC 版采购视角</div>
        </div>

        <div id="page-content"></div>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
